Content=Fortuneteller (489,622) asked you to challenge a mysterious space, including the Peace, Chaos, Deserted, Prosperous, Disturbed, Calm, Death and Life Dimension. Talk to Maggie (19,19) and you`ll be sent to a random one of them, except the Life. Kill monsters in the dimensions and collect 6 different tokens. If you happen to enter the Death Dimension, you should have at least 3 different tokens to leave, or you`ll die from there. After collecting all the 6 tokens, you can talk to the Ghost or Maggie to make a Soul Jade with your tokens and enter the Life Dimension. Use the Soul Jade to release one of the Vagrant Ghosts, and you`ll be rewarded with a Moon Box.
