Content=Bryan has a mirror, in which grieved souls pile up as a high mountain. Please raze the mountain of grievance by killing demons in the abyss. When you raze the mountain to the ground, report to Bryan and find Angela to continue the trial. Note:\nDefeating 1 Vale Demon/Singing Serpent/Blue Fiend/Wind Ape/Wood Hades/Fury Bat/Bone Skeleton/Angry Beast can raze the mountain by 20 meters;\ndefeating 1 Mud Demon/Roaring Serpent/Red Fiend/Rain Ape/Water Hades/Cruel Bat/Lame Skeleton/Sensitive Beast can raze the mountain by 120 meters;\ndefeating 1 Abyss Demon/CryingSerpent/White Fiend/Lightning Ape/Earth Hades/Vicious Bat/Carrion Skeleton/Crazy Beast can raze the mountain by 400 meters;\ndefeating 1 Shadow King/Serpent Spirit/Fiend Lord/Fury Ape/Hades Lord/Demon Bat/Fury Skeleton/Fearless Beast can raze the mountain by 10000 meters.
